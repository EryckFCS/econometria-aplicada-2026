# Catálogo Declarativo de Variables Econométricas - Trabajo en Grupo
# Este archivo permite definir nuevas variables sin modificar el código en Python.

[[series]]
nombre_raw = "gei_total_exclulucf_MtCO2e"
codigo_api = "EN.ATM.GHGT.KT.CE"
unidad_api = "kt CO2 equivalente"
institucion = "Equipo - Erick Condoy"
rol = "dependiente — ambiental"
concepto = "Emisiones de GEI totales (excluyendo LULUCF)"
